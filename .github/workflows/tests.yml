name: Tests

on:
  push:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Neovim (stable)
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Cache plenary.nvim
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/site/pack/test/start/plenary.nvim
          key: plenary-nvim-${{ runner.os }}

      - name: Install test dependencies
        run: make deps

      - name: Run test suite
        run: make test
